<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الملف الشخصي | مزمز</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><circle cx=%2232%22 cy=%2232%22 r=%2230%22 fill=%22%23c81f3f%22/><circle cx=%2232%22 cy=%2232%22 r=%2222%22 fill=%22%23fff%22/><circle cx=%2232%22 cy=%2232%22 r=%2216%22 fill=%22%23e8384f%22/></svg>">
<link rel="stylesheet" href="css/style.css">
<style>
  .profile-wrap{ max-width:460px; margin:0 auto; padding:calc(var(--nav-h) + 56px) 20px 80px; }
  .profile-card{ background:#fff; border:1px solid var(--line); border-radius:var(--r-lg); padding:36px 28px; box-shadow:var(--shadow-md); text-align:center; }
  .profile-avatar{
    width:76px; height:76px; border-radius:50%; margin:0 auto 18px;
    background:var(--red); color:#fff; display:flex; align-items:center; justify-content:center;
    font-size:28px; font-weight:900; font-family:'Cairo',sans-serif;
  }
  .profile-row{ display:flex; justify-content:space-between; padding:14px 0; border-top:1px solid var(--line); text-align:right; }
  .profile-row span:first-child{ color:var(--text-soft); font-size:13.5px; }
  .profile-row span:last-child{ font-weight:700; font-size:14px; }
  .profile-actions{ display:flex; flex-direction:column; gap:10px; margin-top:24px; }
</style>
</head>
<body>

<header class="nav">
  <div class="container nav-inner">
    <a href="index.html" class="logo">
      <svg class="mark" viewBox="0 0 64 64" fill="none">
        <circle cx="32" cy="32" r="30" fill="#c81f3f"/>
        <circle cx="32" cy="32" r="22" fill="#fff"/>
        <circle cx="32" cy="32" r="15" fill="#e8384f"/>
      </svg>
      مزمز
    </a>
    <nav class="nav-links" aria-label="التنقل الرئيسي">
      <a href="index.html" data-i18n="nav.home">الرئيسية</a>
      <a href="index.html#products" data-i18n="nav.products">المنتجات</a>
      <a href="about.html" data-i18n="nav.about">من نحن</a>
      <a href="contact.html" data-i18n="nav.contact">تواصل معنا</a>
    </nav>
    <div class="nav-actions">
      <div class="account-menu">
        <button class="icon-btn" id="accountToggle" aria-label="الحساب"></button>
        <div class="account-dropdown" id="accountDropdown"></div>
      </div>
      <button class="icon-btn js-open-cart" aria-label="فتح سلة المشتريات">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/><path d="M2 3h2l2.6 12.6a2 2 0 0 0 2 1.6h8.8a2 2 0 0 0 2-1.5L21 8H6"/></svg>
        <span class="cart-badge" id="cartBadge">0</span>
      </button>
      <button class="nav-burger" id="navBurger" aria-label="فتح القائمة" aria-expanded="false"><span></span></button>
    </div>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html" data-i18n="nav.home">الرئيسية</a>
    <a href="index.html#products" data-i18n="nav.products">المنتجات</a>
    <a href="about.html" data-i18n="nav.about">من نحن</a>
    <a href="contact.html" data-i18n="nav.contact">تواصل معنا</a>
  </div>
</header>

<div class="profile-wrap">
  <div class="profile-card hidden" id="loggedOutView">
    <p style="color:var(--text-soft); margin-bottom:18px;" data-i18n="profile.loginPrompt">سجّل الدخول لعرض ملفك الشخصي.</p>
    <a href="account.html?mode=login" class="btn btn-accent btn-block" data-i18n="account.loginBtn">دخول</a>
  </div>

  <div class="profile-card hidden" id="loggedInView">
    <div class="profile-avatar" id="profileAvatar"></div>
    <h1 style="font-size:20px;" id="profileUsernameHeading"></h1>

    <div class="profile-row">
      <span data-i18n="profile.username">اسم المستخدم</span>
      <span id="profileUsername"></span>
    </div>
    <div class="profile-row">
      <span data-i18n="profile.memberSince">تاريخ إنشاء الحساب</span>
      <span id="profileCreatedAt"></span>
    </div>

    <div class="profile-actions">
      <a href="my-orders.html" class="btn btn-primary btn-block" data-i18n="profile.myOrders">عرض طلباتي</a>
      <button type="button" class="btn btn-ghost btn-block" id="profileLogoutBtn" data-i18n="profile.logout">تسجيل خروج</button>
    </div>
  </div>
</div>

<div class="overlay" id="cartOverlay"></div>
<aside class="cart-drawer" id="cartDrawer" aria-label="سلة المشتريات">
  <div class="cart-head">
    <h3><span data-i18n="cart.title">سلة المشتريات</span> (<span id="cartCountLabel">0</span>)</h3>
    <button class="icon-btn js-close-cart" aria-label="إغلاق السلة">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg>
    </button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-foot">
    <div class="cart-total"><span data-i18n="cart.total">الإجمالي</span><b id="cartTotalValue">0.00 د.ك</b></div>
    <button class="btn btn-accent btn-block" id="checkoutBtn" data-i18n="cart.checkout">إتمام الشراء</button>
  </div>
</aside>

<script src="js/i18n.js"></script>
<script src="js/account.js"></script>
<script src="js/main.js"></script>
<script>
  const username = getSession();
  if(username){
    document.getElementById('loggedInView').classList.remove('hidden');
    const accounts = getAccounts();
    const account = accounts[username] || {};
    document.getElementById('profileAvatar').textContent = username.trim().charAt(0).toUpperCase();
    document.getElementById('profileUsernameHeading').textContent = username;
    document.getElementById('profileUsername').textContent = username;
    document.getElementById('profileCreatedAt').textContent = account.createdAt
      ? new Date(account.createdAt).toLocaleDateString((window.MazamizI18n && window.MazamizI18n.getLang() === 'en') ? 'en-US' : 'ar-KW', { dateStyle: 'long' })
      : '—';
  } else {
    document.getElementById('loggedOutView').classList.remove('hidden');
  }
  document.getElementById('profileLogoutBtn').addEventListener('click', logout);
</script>
</body>
</html>
