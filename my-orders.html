<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طلباتي | مزمز</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><circle cx=%2232%22 cy=%2232%22 r=%2230%22 fill=%22%23c81f3f%22/><circle cx=%2232%22 cy=%2232%22 r=%2222%22 fill=%22%23fff%22/><circle cx=%2232%22 cy=%2232%22 r=%2216%22 fill=%22%23e8384f%22/></svg>">
<link rel="stylesheet" href="css/style.css">
<style>
  .myorders-wrap{ max-width:720px; margin:0 auto; padding:calc(var(--nav-h) + 48px) 20px 80px; }
  .myorders-wrap h1{ font-size:22px; margin-bottom:24px; }
  .mo-empty, .mo-loggedout{
    background:#fff; border:1px solid var(--line); border-radius:var(--r-lg);
    padding:48px 24px; text-align:center; color:var(--text-soft);
  }
  .mo-order{
    background:#fff; border:1px solid var(--line); border-radius:var(--r-lg);
    padding:20px 22px; margin-bottom:16px; box-shadow:var(--shadow-sm);
  }
  .mo-head{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:12px; flex-wrap:wrap; }
  .mo-head b{ font-family:'Cairo',sans-serif; font-size:16px; }
  .mo-head .meta{ font-size:12.5px; color:var(--text-soft); margin-top:3px; }
  .mo-badge{
    padding:6px 14px; border-radius:999px; font-size:12px; font-weight:800;
    white-space:nowrap;
  }
  .mo-badge.new{ background:#fbe6ea; color:var(--red); }
  .mo-badge.confirmed{ background:#e2eefb; color:#1a5fb4; }
  .mo-badge.progress{ background:#fbeed1; color:var(--gold-deep); }
  .mo-badge.out{ background:#f3e3d0; color:var(--cantaloupe-deep); }
  .mo-badge.done{ background:#e5f2ea; color:var(--green); }
  .mo-items{ font-size:13.5px; color:var(--text-soft); margin-bottom:10px; line-height:1.8; }
  .mo-total{ display:flex; justify-content:space-between; padding-top:10px; border-top:1px solid var(--line); font-weight:800; font-family:'Cairo',sans-serif; }
</style>
</head>
<body>

<header class="nav">
  <div class="container nav-inner">
    <a href="index.html" class="logo">
      <svg class="mark" viewBox="0 0 64 64" fill="none">
        <circle cx="32" cy="32" r="30" fill="#c81f3f"/>
        <circle cx="32" cy="32" r="22" fill="#fff"/>
        <circle cx="32" cy="32" r="15" fill="#e8384f"/>
      </svg>
      مزمز
    </a>
    <nav class="nav-links" aria-label="التنقل الرئيسي">
      <a href="index.html" data-i18n="nav.home">الرئيسية</a>
      <a href="index.html#products" data-i18n="nav.products">المنتجات</a>
      <a href="about.html" data-i18n="nav.about">من نحن</a>
      <a href="contact.html" data-i18n="nav.contact">تواصل معنا</a>
    </nav>
    <div class="nav-actions">
      <div class="account-menu">
        <button class="icon-btn" id="accountToggle" aria-label="الحساب"></button>
        <div class="account-dropdown" id="accountDropdown"></div>
      </div>
      <button class="icon-btn js-open-cart" aria-label="فتح سلة المشتريات">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/><path d="M2 3h2l2.6 12.6a2 2 0 0 0 2 1.6h8.8a2 2 0 0 0 2-1.5L21 8H6"/></svg>
        <span class="cart-badge" id="cartBadge">0</span>
      </button>
      <button class="nav-burger" id="navBurger" aria-label="فتح القائمة" aria-expanded="false"><span></span></button>
    </div>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html" data-i18n="nav.home">الرئيسية</a>
    <a href="index.html#products" data-i18n="nav.products">المنتجات</a>
    <a href="about.html" data-i18n="nav.about">من نحن</a>
    <a href="contact.html" data-i18n="nav.contact">تواصل معنا</a>
  </div>
</header>

<div class="myorders-wrap">
  <h1 data-i18n="myorders.heading">طلباتي</h1>

  <div class="mo-loggedout hidden" id="loggedOutView">
    <p style="margin-bottom:18px;" data-i18n="myorders.loginPrompt">سجّل الدخول لعرض طلباتك.</p>
    <a href="account.html?mode=login" class="btn btn-accent" data-i18n="account.loginBtn">دخول</a>
  </div>

  <div id="ordersView" class="hidden">
    <div class="mo-empty hidden" id="emptyMsg" data-i18n="myorders.empty">ما عندك أي طلبات بعد.</div>
    <div id="ordersList"></div>
  </div>
</div>

<div class="overlay" id="cartOverlay"></div>
<aside class="cart-drawer" id="cartDrawer" aria-label="سلة المشتريات">
  <div class="cart-head">
    <h3><span data-i18n="cart.title">سلة المشتريات</span> (<span id="cartCountLabel">0</span>)</h3>
    <button class="icon-btn js-close-cart" aria-label="إغلاق السلة">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg>
    </button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-foot">
    <div class="cart-total"><span data-i18n="cart.total">الإجمالي</span><b id="cartTotalValue">0.00 د.ك</b></div>
    <button class="btn btn-accent btn-block" id="checkoutBtn" data-i18n="cart.checkout">إتمام الشراء</button>
  </div>
</aside>

<script src="js/i18n.js"></script>
<script src="js/account.js"></script>
<script src="js/main.js"></script>
<script src="js/my-orders.js"></script>
</body>
</html>
