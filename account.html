<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حسابي | مزمز</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><circle cx=%2232%22 cy=%2232%22 r=%2230%22 fill=%22%23c81f3f%22/><circle cx=%2232%22 cy=%2232%22 r=%2222%22 fill=%22%23fff%22/><circle cx=%2232%22 cy=%2232%22 r=%2216%22 fill=%22%23e8384f%22/></svg>">
<link rel="stylesheet" href="css/style.css">
<style>
  .auth-wrap{ max-width:420px; margin:0 auto; padding:calc(var(--nav-h) + 56px) 20px 80px; }
  .auth-card{ background:#fff; border:1px solid var(--line); border-radius:var(--r-lg); padding:32px 28px; box-shadow:var(--shadow-md); }
  .auth-tabs{ display:flex; gap:8px; margin-bottom:24px; background:var(--bg-alt); border-radius:999px; padding:4px; }
  .auth-tab{ flex:1; text-align:center; padding:10px; border-radius:999px; font-size:13.5px; font-weight:700; color:var(--text-soft); border:none; background:none; font-family:inherit; }
  .auth-tab.active{ background:#fff; color:var(--text); box-shadow:var(--shadow-sm); }
  .auth-form{ display:none; }
  .auth-form.active{ display:block; }
  .auth-status{ font-size:13px; margin-top:12px; min-height:16px; }
  .auth-status.err{ color:var(--red); }
  .auth-switch{ text-align:center; font-size:13px; color:var(--text-soft); margin-top:18px; }
  .auth-switch a{ color:var(--red); font-weight:700; }
</style>
</head>
<body>

<header class="nav">
  <div class="container nav-inner">
    <a href="index.html" class="logo">
      <svg class="mark" viewBox="0 0 64 64" fill="none">
        <circle cx="32" cy="32" r="30" fill="#c81f3f"/>
        <circle cx="32" cy="32" r="22" fill="#fff"/>
        <circle cx="32" cy="32" r="15" fill="#e8384f"/>
      </svg>
      مزمز
    </a>
    <nav class="nav-links" aria-label="التنقل الرئيسي">
      <a href="index.html" data-i18n="nav.home">الرئيسية</a>
      <a href="index.html#products" data-i18n="nav.products">المنتجات</a>
      <a href="about.html" data-i18n="nav.about">من نحن</a>
      <a href="contact.html" data-i18n="nav.contact">تواصل معنا</a>
    </nav>
    <div class="nav-actions">
      <div class="account-menu">
        <button class="icon-btn" id="accountToggle" aria-label="الحساب"></button>
        <div class="account-dropdown" id="accountDropdown"></div>
      </div>
      <button class="icon-btn js-open-cart" aria-label="فتح سلة المشتريات">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/><path d="M2 3h2l2.6 12.6a2 2 0 0 0 2 1.6h8.8a2 2 0 0 0 2-1.5L21 8H6"/></svg>
        <span class="cart-badge" id="cartBadge">0</span>
      </button>
      <button class="nav-burger" id="navBurger" aria-label="فتح القائمة" aria-expanded="false"><span></span></button>
    </div>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html" data-i18n="nav.home">الرئيسية</a>
    <a href="index.html#products" data-i18n="nav.products">المنتجات</a>
    <a href="about.html" data-i18n="nav.about">من نحن</a>
    <a href="contact.html" data-i18n="nav.contact">تواصل معنا</a>
  </div>
</header>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-tabs">
      <button type="button" class="auth-tab" id="tabLogin" data-i18n="account.loginTab">تسجيل الدخول</button>
      <button type="button" class="auth-tab" id="tabSignup" data-i18n="account.signupTab">إنشاء حساب</button>
    </div>

    <!-- تسجيل الدخول -->
    <form class="auth-form" id="loginForm">
      <div class="field">
        <label for="loginUsername" data-i18n="account.username">اسم المستخدم</label>
        <input type="text" id="loginUsername" required>
      </div>
      <div class="field">
        <label for="loginPassword" data-i18n="account.password">كلمة المرور</label>
        <input type="password" id="loginPassword" required>
      </div>
      <button type="submit" class="btn btn-accent btn-block" data-i18n="account.loginBtn">دخول</button>
      <p class="auth-status err" id="loginError"></p>
    </form>

    <!-- إنشاء حساب -->
    <form class="auth-form" id="signupForm">
      <div class="field">
        <label for="signupUsername" data-i18n="account.username">اسم المستخدم</label>
        <input type="text" id="signupUsername" required>
      </div>
      <div class="field">
        <label for="signupPassword" data-i18n="account.password">كلمة المرور</label>
        <input type="password" id="signupPassword" required>
      </div>
      <div class="field">
        <label for="signupConfirm" data-i18n="account.confirmPassword">تأكيد كلمة المرور</label>
        <input type="password" id="signupConfirm" required>
      </div>
      <button type="submit" class="btn btn-accent btn-block" data-i18n="account.signupBtn">إنشاء الحساب</button>
      <p class="auth-status err" id="signupError"></p>
    </form>

    <p class="auth-switch" id="switchNote"></p>
  </div>
</div>

<div class="overlay" id="cartOverlay"></div>
<aside class="cart-drawer" id="cartDrawer" aria-label="سلة المشتريات">
  <div class="cart-head">
    <h3><span data-i18n="cart.title">سلة المشتريات</span> (<span id="cartCountLabel">0</span>)</h3>
    <button class="icon-btn js-close-cart" aria-label="إغلاق السلة">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg>
    </button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-foot">
    <div class="cart-total"><span data-i18n="cart.total">الإجمالي</span><b id="cartTotalValue">0.00 د.ك</b></div>
    <button class="btn btn-accent btn-block" id="checkoutBtn" data-i18n="cart.checkout">إتمام الشراء</button>
  </div>
</aside>

<script src="js/i18n.js"></script>
<script src="js/account.js"></script>
<script src="js/main.js"></script>
<script>
  // إذا مسجّل دخول أصلاً، ما في داعي يشوف نموذج الدخول من جديد
  if(getSession()){
    window.location.href = 'profile.html';
  }

  // منطق التبويبات + ربط النماذج بدوال signup/login من js/account.js
  const tabLogin = document.getElementById('tabLogin');
  const tabSignup = document.getElementById('tabSignup');
  const loginForm = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');
  const switchNote = document.getElementById('switchNote');

  function showTab(which){
    const isLogin = which === 'login';
    tabLogin.classList.toggle('active', isLogin);
    tabSignup.classList.toggle('active', !isLogin);
    loginForm.classList.toggle('active', isLogin);
    signupForm.classList.toggle('active', !isLogin);
    const lang = (window.MazamizI18n && window.MazamizI18n.getLang()) || 'ar';
    const t = (ar, en) => (lang === 'en' ? en : ar);
    switchNote.innerHTML = isLogin
      ? `${t('ما عندك حساب؟', "Don't have an account?")} <a href="#" id="goSignup">${t('إنشاء حساب','Sign up')}</a>`
      : `${t('عندك حساب أصلاً؟','Already have an account?')} <a href="#" id="goLogin">${t('تسجيل الدخول','Log in')}</a>`;
    const link = document.getElementById(isLogin ? 'goSignup' : 'goLogin');
    if(link) link.addEventListener('click', (e) => { e.preventDefault(); showTab(isLogin ? 'signup' : 'login'); });
  }

  tabLogin.addEventListener('click', () => showTab('login'));
  tabSignup.addEventListener('click', () => showTab('signup'));

  const params = new URLSearchParams(window.location.search);
  showTab(params.get('mode') === 'signup' ? 'signup' : 'login');

  loginForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const result = login(document.getElementById('loginUsername').value, document.getElementById('loginPassword').value);
    const errEl = document.getElementById('loginError');
    if(result.ok){
      errEl.textContent = '';
      window.location.href = 'profile.html';
    } else {
      errEl.textContent = result.error;
    }
  });

  signupForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const result = signup(
      document.getElementById('signupUsername').value,
      document.getElementById('signupPassword').value,
      document.getElementById('signupConfirm').value
    );
    const errEl = document.getElementById('signupError');
    if(result.ok){
      errEl.textContent = '';
      window.location.href = 'profile.html';
    } else {
      errEl.textContent = result.error;
    }
  });
</script>
</body>
</html>
