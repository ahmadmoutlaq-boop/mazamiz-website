<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>الطلبات | مزمز</title>
<link rel="stylesheet" href="css/style.css">
<style>
  body{ background:var(--bg-alt); min-height:100vh; }
  .admin-wrap{ max-width:900px; margin:0 auto; padding:40px 20px 80px; }
  .admin-topbar{
    display:flex; align-items:center; justify-content:space-between;
    gap:16px; margin-bottom:24px; flex-wrap:wrap;
  }
  .admin-topbar h1{ font-size:22px; }
  .admin-topbar a{ font-size:13.5px; color:var(--text-soft); }
  .admin-topbar a:hover{ color:var(--red); }

  .gate{ max-width:420px; margin:80px auto; text-align:center; background:#fff; border:1px solid var(--line); border-radius:var(--r-lg); padding:32px 28px; box-shadow:var(--shadow-md); }
  .gate h1{ font-size:22px; margin-bottom:6px; }
  .gate p.sub{ color:var(--text-soft); font-size:13.5px; margin-bottom:24px; }
  .gate .field{ text-align:right; margin-bottom:18px; }
  .gate .field label{ display:block; font-size:13.5px; font-weight:700; margin-bottom:8px; }
  .gate .field input{
    width:100%; border:1px solid var(--line); border-radius:var(--r-sm);
    padding:12px 14px; font-size:15px; font-family:inherit; background:var(--bg-alt);
  }
  .gate .field input:focus{ outline:none; border-color:var(--red); background:#fff; }
  .admin-status{ margin-top:14px; font-size:13px; min-height:16px; }
  .admin-status.err{ color:var(--red); }

  .toolbar{
    display:flex; gap:10px; flex-wrap:wrap; margin-bottom:22px;
  }
  .toolbar input[type="text"]{
    flex:1; min-width:180px;
    border:1px solid var(--line); border-radius:999px;
    padding:11px 18px; font-size:14px; font-family:inherit; background:#fff;
  }
  .toolbar input[type="text"]:focus{ outline:none; border-color:var(--red); }
  .toolbar button{
    border:1px solid var(--line); background:#fff; border-radius:999px;
    padding:11px 18px; font-size:13.5px; font-weight:700; white-space:nowrap;
  }
  .toolbar button:hover{ border-color:var(--text); }

  .order-card{
    background:#fff; border:1px solid var(--line); border-radius:var(--r-lg);
    padding:22px; margin-bottom:16px; box-shadow:var(--shadow-sm);
  }
  .order-head{
    display:flex; justify-content:space-between; align-items:flex-start;
    gap:12px; margin-bottom:14px; padding-bottom:14px; border-bottom:1px solid var(--line);
    flex-wrap:wrap;
  }
  .order-head b{ font-family:'Cairo',sans-serif; font-size:16px; }
  .order-head .meta{ font-size:12.5px; color:var(--text-soft); margin-top:4px; }
  .status-select{
    border:1px solid var(--line); border-radius:999px; padding:8px 14px;
    font-size:13px; font-weight:700; font-family:inherit; background:var(--bg-alt);
  }
  .status-select.new{ color:var(--red); }
  .status-select.progress{ color:var(--gold-deep); }
  .status-select.done{ color:var(--green); }

  .order-grid{ display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-bottom:14px; }
  .order-block h5{ font-size:12.5px; color:var(--text-faint); font-weight:700; margin-bottom:6px; }
  .order-block p{ font-size:14px; line-height:1.7; }
  .order-items{ font-size:13.5px; display:flex; flex-direction:column; gap:4px; }
  .order-items .line{ display:flex; justify-content:space-between; }
  .order-totals{
    margin-top:12px; padding-top:12px; border-top:1px solid var(--line);
    display:flex; flex-direction:column; gap:4px; font-size:13.5px;
  }
  .order-totals .grand{ font-family:'Cairo',sans-serif; font-weight:800; font-size:16px; margin-top:4px; }
  .order-foot{
    display:flex; justify-content:space-between; align-items:center; margin-top:16px;
  }
  .del-btn{
    color:var(--red); font-size:13px; font-weight:700; border:none; background:none;
  }
  .del-btn:hover{ text-decoration:underline; }
  .empty-msg{ text-align:center; color:var(--text-soft); padding:60px 20px; }

  @media (max-width:600px){
    .order-grid{ grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<div class="admin-wrap">

  <!-- ============ بوابة كلمة المرور ============ -->
  <div class="gate" id="gateView">
    <h1>🔒 لوحة الطلبات</h1>
    <p class="sub">هذه الصفحة خاصة بإدارة مزمز فقط</p>
    <div class="field">
      <label for="passwordInput">كلمة المرور</label>
      <input type="password" id="passwordInput" placeholder="••••••••">
    </div>
    <button class="btn btn-accent btn-block" id="unlockBtn">دخول</button>
    <p class="admin-status err" id="gateError"></p>
  </div>

  <!-- ============ لوحة الطلبات ============ -->
  <div id="panelView" class="hidden">
    <div class="admin-topbar">
      <h1>📦 الطلبات</h1>
      <a href="admin.html">↩ لوحة الأسعار</a>
    </div>

    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="ابحث بالاسم أو رقم الهاتف...">
      <button id="sortToggle">الأحدث أولاً ↓</button>
      <button id="refreshBtn">تحديث ⟳</button>
    </div>

    <div id="ordersList"></div>
    <p class="empty-msg hidden" id="emptyMsg">ما في طلبات لعرضها.</p>
  </div>

</div>

<script src="js/orders-admin.js"></script>
</body>
</html>
